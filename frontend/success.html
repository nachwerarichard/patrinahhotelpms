<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Novus Cloud</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Break out of the Pesapal payment iframe if trapped
        if (window.top !== window.self) {
            window.top.location = window.self.location.href;
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl border border-slate-100 p-8 text-center transition-all duration-300 transform scale-100">
        <!-- Success Icon Graphic -->
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-emerald-50 mb-6">
            <svg class="h-10 w-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <!-- Headline Text -->
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Payment Confirmed</h1>
        <p class="text-slate-500 text-sm mb-6">Your transaction was processed successfully. The system has updated your folio state.</p>

        <!-- Transaction Specs Grid -->
        <div class="bg-slate-50 rounded-xl p-4 text-left border border-slate-100 space-y-3 mb-8 text-sm">
            <div class="flex justify-between items-center">
                <span class="text-slate-400 font-medium">Reference Code:</span>
                <span id="merchantRef" class="text-slate-700 font-mono font-bold">---</span>
            </div>
            <div class="flex justify-between items-center border-t border-slate-200/60 pt-3">
                <span class="text-slate-400 font-medium">Gateway Tracking ID:</span>
                <span id="trackingId" class="text-slate-600 font-mono text-xs">---</span>
            </div>
        </div>

        <!-- Navigation Actions -->
        <div class="space-y-3">
            <a href="/dashboard" class="block w-full text-center bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl transition duration-200 shadow-sm text-sm">
                Return to Management Panel
            </a>
            <button onclick="window.print()" class="block w-full text-center bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium py-2.5 px-4 rounded-xl transition duration-200 text-xs">
                Print Confirmation Receipt
            </button>
        </div>
    </div>

    <!-- Live Script Interface String Processor -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const trackingId = urlParams.get('OrderTrackingId');
            const merchantRef = urlParams.get('OrderMerchantReference');

            if (merchantRef) document.getElementById('merchantRef').textContent = merchantRef;
            if (trackingId) document.getElementById('trackingId').textContent = trackingId;
        });
    </script>
</body>
</html>
